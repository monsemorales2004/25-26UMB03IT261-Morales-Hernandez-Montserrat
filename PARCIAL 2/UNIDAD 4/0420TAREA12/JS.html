<html>
<html lang="es" ng-app="miApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto AngularJS + Bootstrap</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>
<body ng-controller="MainController" class="bg-light">

    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h2 class="mb-0">{{ titulo }}</h2>
            </div>
            <div class="card-body">
                <p class="lead">Bienvenido, <strong>{{ usuario }}</strong>.</p>
                
                <div class="mb-3">
                    <label for="nombreInput" class="form-label">Cambiar nombre:</label>
                    <input type="text" class="form-control" id="nombreInput" ng-model="usuario">
                </div>

                <button class="btn btn-outline-primary" ng-click="saludar()">
                    Lanzar Alerta
                </button>
            </div>
            <div class="card-footer text-muted text-center">
                Estructura Base - 2026
            </div>
        </div>
    </div>

    <script>
        // Definición del Módulo Principal
        var app = angular.module('miApp', []);

        // Definición del Controlador
        app.controller('MainController', function($scope) {
            $scope.titulo = "Panel de Control AngularJS";
            $scope.usuario = "Desarrollador";

            $scope.saludar = function() {
                alert("¡Hola " + $scope.usuario + "! El controlador está funcionando.");
            };
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
