<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<div class="container" ng-app="app" ng-controller="Index">

    <div class="row">
        <div class="col-md-12">
            <input type="text" ng-model="mensaje1">
        </div>
        <div class="col-md-3">
            <button ng-click="ctrlBoton()">Clic para alerta</button>
        </div>

        <div class="col-md-3">
            <p ng-bind="mensaje1"></p>
        </div>

        <div class="col-md-3"></div>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
<script src="js/libs/angular.min.js"></script>
<script src="js/modulos/app.module.js"></script>
<script src="js/controladores/index.controller.js"></script>

<body class="bg-light p-4">

    <div class="container bg-white border rounded shadow-sm p-4">
        <h2 class="fw-bold mb-0">Rutas</h2>
        <div class="card-header-line"></div>
        <hr class="mb-4">

        <form>
            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label text-secondary small">Fecha de inicio</label>
                    <input type="date"  ng-model="fechainicio" class="form-control" placeholder="dd/mm/aaaa">
                </div>
                <div class="col-md-4">
                    <label class="form-label text-secondary small">Fecha de conclusión</label>
                    <input type="date" ng-model="fechaconclucion" class="form-control" placeholder="dd/mm/aaaa">
                </div>
                <div class="col-md-4">
                    <label class="form-label text-secondary small">Proveedor</label>
                    <select class="form-select text-muted">
                        <option selected>Seleccione un proveedor</option>
                    </select>
                </div>
            </div>

            <div class="row mb-4">
                <div class="col-md-4">
                    <label class="form-label text-secondary small">Auto</label>
                    <select class="form-select text-muted">
                        <option selected>Seleccione un auto</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label text-secondary small">Driver</label>
                    <select class="form-select text-muted">
                        <option selected>Seleccione un driver</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label text-secondary small">Id ruta</label>
                    <input type="text" class="form-control" placeholder="Id ruta">
                </div>
            </div>

            <div class="row mt-4">
                <div class="col-md-4">
                    <button type="button" class="btn btn-search w-100 fw-bold py-2">Buscar</button>
                </div>
                <div class="col-md-4">
                    <button type="button" class="btn btn-primary w-100 fw-bold py-2">Nueva ruta</button>
                </div>
            </div>
        </form>
    </div>

    <div class="container mt-3 px-0">
        <div class="border rounded-pill py-2 text-center text-muted small shadow-sm">
        </div>
    </div>

</body>


</body>
</html>
